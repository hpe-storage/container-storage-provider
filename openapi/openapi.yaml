openapi: 3.0.0
info:
  description: >
    This API, used by the HPE CSI driver, enables management of resources used
    for container workloads. It is not intended for direct usage outside of the
    CSI driver but is provided here for documentation purposes.
  version: 1.1.0
  title: csp
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
tags:
  - name: hosts
  - name: replication_partners
  - name: snapshot_groups
  - name: snapshots
  - name: tokens
  - name: volume_groups
  - name: volumes
paths:
  /hosts:
    get:
      tags:
        - hosts
      summary: Get all hosts used for container workloads
      description: ""
      operationId: getHosts
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Host"
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
    post:
      tags:
        - hosts
      summary: Create host
      description: ""
      operationId: createHost
      requestBody:
        description: A host that needs to be added to the CSP
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Host"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Host"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
    delete:
      tags:
        - hosts
      summary: Delete host
      description: ""
      operationId: deleteHostByUuid
      parameters:
        - name: uuid
          in: query
          required: false
          schema:
            type: string
      responses:
        "204":
          description: Host deleted
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  "/hosts/{id}":
    delete:
      tags:
        - hosts
      summary: Delete host
      description: ""
      operationId: deleteHostById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Host deleted
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  /replication_partners:
    get:
      tags:
        - replication_partners
      summary: Get all replication partners used for container workloads
      description: ""
      operationId: getReplicationPartners
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerReplicationPartner"
        "401":
          description: Unauthorized
        "404":
          description: Replication partner name cannot be found
        "500":
          description: Internal Server Error
  /snapshot_groups:
    get:
      tags:
        - snapshot_groups
      summary: Get all snapshot groups used for container workloads
      description: ""
      operationId: getSnapshotGroups
      parameters:
        - name: volume_group_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SnapshotGroup"
        "400":
          description: Bad Request if volume group ID is not provided
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
    post:
      tags:
        - snapshot_groups
      summary: Create a snapshot group
      description: ""
      operationId: createSnapshotGroup
      requestBody:
        description: The snapshot group to create
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotGroup"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotGroup"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  "/snapshot_groups/{id}":
    get:
      tags:
        - snapshot_groups
      summary: Get a snapshot group with the given ID
      description: ""
      operationId: getSnapshotGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotGroup"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Snapshot group ID not found
        "500":
          description: Internal Server Error
    delete:
      tags:
        - snapshot_groups
      summary: Delete a snapshot group
      description: ""
      operationId: deleteSnapshotGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Snapshot group deleted
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Snapshot group ID not found
        "500":
          description: Internal Server Error
  /snapshots:
    get:
      tags:
        - snapshots
      summary: Get snapshots for the provided volume
      description: ""
      operationId: getSnapshots
      parameters:
        - name: volume_id
          in: query
          required: false
          schema:
            type: string
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          description: >-
            Optional response-behavior selector for the snapshot list. When set to
            `exists`, the CSP performs a lightweight existence check for snapshots of
            the given `volume_id` instead of returning the full list, avoiding loading
            all snapshot metadata into memory (used by the volume-delete precondition
            check). In this mode the response array contains at most one snapshot — a
            single element if any snapshot exists, or an empty array if none do. When
            omitted, the full list of snapshots is returned (default). CSPs that do not
            implement this optimization ignore the parameter and return the full list,
            so callers must rely only on whether the array is non-empty.
          schema:
            type: string
            enum:
              - exists
      responses:
        "200":
          description: >-
            Success. Returns the array of snapshots for the volume. When
            `mode=exists` is supplied, the array contains at most one element
            (empty if the volume has no snapshots).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerVolumeSnapshot"
        "400":
          description: Bad Request if volume group ID is not provided
        "401":
          description: Unauthorized
        "404":
          description: Not Found if volume ID or snapshot name cannot be found
        "500":
          description: Internal Server Error
    post:
      tags:
        - snapshots
      summary: Create a snapshot
      description: ""
      operationId: createSnapshot
      requestBody:
        description: The snapshot to create
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContainerVolumeSnapshot"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerVolumeSnapshot"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  "/snapshots/{id}":
    get:
      tags:
        - snapshots
      summary: Get a snapshot with the given ID
      description: ""
      operationId: getSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerVolumeSnapshot"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found if snapshot ID cannot be found
        "500":
          description: Internal Server Error
    delete:
      tags:
        - snapshots
      summary: Delete a snapshot
      description: ""
      operationId: deleteSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Snapshot deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found if snapshot ID is not found
        "500":
          description: Internal Server Error
  /tokens:
    post:
      tags:
        - tokens
      operationId: createToken
      security: []
      requestBody:
        description: Credentials used to create a session token
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessToken"
        "400":
          description: Bad Request
        "401":
          description: Invalid username and/or password
        "500":
          description: Internal Server Error
  "/tokens/{id}":
    delete:
      tags:
        - tokens
      operationId: delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: OK logged out
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
  /volume_groups:
    get:
      tags:
        - volume_groups
      summary: Get all volume groups used for container workloads
      description: ""
      operationId: getVolumeGroups
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolumeGroup"
        "401":
          description: Unauthorized
        "404":
          description: Not Found if the volume group name cannot be found
        "500":
          description: Internal Server Error
    post:
      tags:
        - volume_groups
      summary: Create a new volume group for container workloads
      description: ""
      operationId: createVolumeGroup
      requestBody:
        description: The volume group to create
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolumeGroup"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeGroup"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  "/volume_groups/{id}":
    get:
      tags:
        - volume_groups
      summary: Get the volume group with the given ID
      description: ""
      operationId: getVolumeGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeGroup"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found if volume group ID cannot be found
        "500":
          description: Internal Server Error
    delete:
      tags:
        - volume_groups
      summary: Delete a volume group
      description: ""
      operationId: deleteVolumeGroup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Volume group deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found if volume group ID is not found
        "409":
          description: Conflict if the volume group cannot be deleted
        "500":
          description: Internal Server Error
  /volumes:
    get:
      tags:
        - volumes
      summary: Get all volumes used for container workloads
      description: ""
      operationId: getVolumes
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerVolume"
        "401":
          description: Unauthorized
        "404":
          description: Not Found if the volume name cannot be found
        "500":
          description: Internal Server Error
    post:
      tags:
        - volumes
      summary: Create a new volume (or clone an existing snapshot/volume) for
        container workloads
      description: ""
      operationId: createVolume
      requestBody:
        description: The volume to create (or the snapshot/volume to clone)
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContainerVolume"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerVolume"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
  "/volumes/{id}":
    get:
      tags:
        - volumes
      summary: Get the volume with the given ID
      description: ""
      operationId: getVolume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerVolume"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found if volume ID cannot be found
        "500":
          description: Internal Server Error
    put:
      tags:
        - volumes
      summary: Edit the volume with the given ID
      description: ""
      operationId: editVolume
      requestBody:
        description: The volume attributes to edit
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContainerVolume"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerVolume"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found if volume ID cannot be found
        "500":
          description: Internal Server Error
    delete:
      tags:
        - volumes
      summary: Delete a volume
      description: ""
      operationId: deleteVolume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: force
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "204":
          description: Volume deleted
        "400":
          description: Bad Request if the volume is published
        "401":
          description: Unauthorized
        "404":
          description: Not found if volume ID is not found
        "409":
          description: Conflict if the volume cannot be deleted
        "500":
          description: Internal Server Error
  "/volumes/{id}/actions/publish":
    put:
      tags:
        - volumes
      summary: Publishes a volume to the given host
      description: ""
      operationId: publishVolume
      requestBody:
        description: The host and access protocol to publish the volume to
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishOptions"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Volume published successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishInfo"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not found if volume ID or host UUID is not found
        "500":
          description: Internal Server Error
  "/volumes/{id}/actions/unpublish":
    put:
      tags:
        - volumes
      summary: Unpublishes a volume to the given host
      description: ""
      operationId: unpublishVolume
      requestBody:
        description: The host to unpublish the volume from
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnpublishOptions"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Volume unpublished successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishInfo"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not found if volume ID or host UUID cannot be found
        "500":
          description: Internal Server Error
servers:
  - url: /containers/v1
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-auth-token
  schemas:
    AccessToken:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        username:
          type: string
        password:
          type: string
        array_ip:
          type: string
        session_token:
          type: string
        creation_time:
          type: integer
          format: int64
        expiry_time:
          type: integer
          format: int64
    ContainerReplicationPartner:
      type: object
      properties:
        alive:
          type: boolean
        id:
          type: string
        name:
          type: string
        repl_role:
          type: string
          enum:
            - upstream
            - downstream
            - none
            - bi_directional
        is_alive:
          type: boolean
    ContainerVolume:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        size:
          type: integer
          format: int64
        description:
          type: string
        clone:
          type: boolean
        published:
          type: boolean
        config:
          $ref: "#/components/schemas/VolumeConfig"
        base_snapshot_id:
          type: string
        volume_group_id:
          type: string
    ContainerVolumeSnapshot:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        size:
          type: integer
          format: int64
        description:
          type: string
        config:
          $ref: "#/components/schemas/SnapshotConfig"
        volume_id:
          type: string
        volume_name:
          type: string
        creation_time:
          type: integer
          format: int64
        ready_to_use:
          type: boolean
    Host:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        uuid:
          type: string
        iqns:
          type: array
          items:
            type: string
        wwpns:
          type: array
          items:
            type: string
        nqns:
          type: array
          items:
            type: string
        networks:
          type: array
          items:
            type: string
        chap_user:
          type: string
        chap_password:
          type: string
        access_protocol:
          type: string
          description: >-
            Data access protocol the host uses to attach volumes
            (for example: iscsi, fc, nvme).
        virtual_domain:
          type: string
          description: >-
            Optional virtual domain that the host belongs to. When set, the CSP
            scopes host and volume export operations to this virtual domain.
    PublishInfo:
      type: object
      properties:
        serial_number:
          type: string
        target_names:
          type: array
          uniqueItems: true
          items:
            type: string
        access_protocol:
          type: string
          enum:
            - iscsi
            - fc
        lun_id:
          type: integer
          format: int64
        discovery_ips:
          type: array
          uniqueItems: true
          items:
            type: string
    PublishOptions:
      type: object
      properties:
        host_uuid:
          type: string
        access_protocol:
          type: string
          enum:
            - iscsi
            - fc
    UnpublishOptions:
      type: object
      properties:
        host_uuid:
          type: string
    SnapshotConfig:
      type: object
    SnapshotGroup:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/ContainerVolumeSnapshot"
        config:
          $ref: "#/components/schemas/SnapshotGroupConfig"
        volume_group_id:
          type: string
        volume_group_name:
          type: string
        creation_time:
          type: integer
          format: int64
    SnapshotGroupConfig:
      type: object
      properties:
        replicate:
          type: boolean
        is_complete:
          type: boolean
        repl_status:
          type: string
          enum:
            - fail
            - in_progress
            - pending
            - complete
        repl_complete_time:
          type: integer
          format: int64
        repl_start_time:
          type: integer
          format: int64
    VolumeConfig:
      type: object
    VolumeGroup:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        description:
          type: string
        config:
          $ref: "#/components/schemas/VolumeGroupConfig"
        volumes:
          type: array
          items:
            $ref: "#/components/schemas/ContainerVolume"
        creation_time:
          type: integer
          format: int64
    VolumeGroupConfig:
      type: object
      properties:
        replication_partner:
          type: string
        protection_template:
          type: string
